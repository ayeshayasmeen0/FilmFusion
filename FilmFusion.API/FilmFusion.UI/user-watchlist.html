<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Watchlist - FilmFusion</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .watchlist-header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease-out;
        }

            .watchlist-header h1 {
                font-size: 2.5rem;
                background: linear-gradient(135deg, #9b59b6, #d2b0e5);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                margin-bottom: 0.5rem;
            }

            .watchlist-header p {
                color: #6a5a7a;
                font-size: 1rem;
            }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }

            .empty-state .empty-icon {
                font-size: 4rem;
                margin-bottom: 1rem;
                opacity: 0.5;
            }

            .empty-state h3 {
                color: #2d1b4e;
                margin-bottom: 0.5rem;
            }

            .empty-state p {
                color: #6a5a7a;
                margin-bottom: 1.5rem;
            }

            .empty-state .btn-explore {
                background: linear-gradient(135deg, #9b59b6, #d2b0e5);
                color: white;
                border: none;
                padding: 0.8rem 2rem;
                border-radius: 50px;
                cursor: pointer;
                font-weight: 600;
                transition: all 0.3s ease;
            }

                .empty-state .btn-explore:hover {
                    transform: translateY(-3px);
                    box-shadow: 0 8px 20px rgba(155, 89, 182, 0.3);
                }

        .movie-card {
            position: relative;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0;
        }

            .movie-card:nth-child(1) {
                animation-delay: 0.05s;
            }

            .movie-card:nth-child(2) {
                animation-delay: 0.1s;
            }

            .movie-card:nth-child(3) {
                animation-delay: 0.15s;
            }

            .movie-card:nth-child(4) {
                animation-delay: 0.2s;
            }

            .movie-card:nth-child(5) {
                animation-delay: 0.25s;
            }

            .movie-card:hover {
                transform: translateY(-8px);
                box-shadow: 0 15px 35px rgba(155, 89, 182, 0.2);
            }

        .movie-poster {
            position: relative;
            overflow: hidden;
        }

            .movie-poster img {
                width: 100%;
                height: auto;
                transition: transform 0.5s ease;
            }

        .movie-card:hover .movie-poster img {
            transform: scale(1.05);
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(231, 76, 60, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

            .remove-btn:hover {
                background: #e74c3c;
                transform: scale(1.1);
            }

        .watch-note {
            margin-top: 0.8rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

            .watch-note input {
                flex: 1;
                padding: 0.5rem;
                border: 1px solid #e0d4e8;
                border-radius: 8px;
                font-size: 0.8rem;
                background: #f8f5fa;
            }

        .save-note-btn {
            background: #9b59b6;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }

            .save-note-btn:hover {
                background: #d2b0e5;
                transform: scale(1.02);
            }

        .movie-info {
            padding: 1rem;
        }

        .movie-title {
            font-weight: 700;
            color: #2d1b4e;
            margin-bottom: 0.3rem;
            font-size: 1rem;
        }

        .movie-year {
            font-size: 0.8rem;
            color: #9b59b6;
        }

        .movie-rating {
            font-size: 0.85rem;
            color: #f1c40f;
            margin-top: 0.3rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="logo">🎬 FilmFusion</div>
            <div class="nav-links">
                <a href="user-dashboard.html">🏠 Home</a>
                <a href="user-favorites.html">❤️ Favorites</a>
                <a href="user-watchlist.html" class="active">📝 Watchlist</a>
                <a href="user-chatbot.html">🤖 AI Assistant</a>
                <a href="user-profile.html">👤 Profile</a>
                <button class="logout-btn" onclick="window.logout()">Logout</button>
            </div>
        </nav>

        <div class="dashboard-content">
            <div class="watchlist-header">
                <h1>📝 Your Watchlist</h1>
                <p>Movies you plan to watch later</p>
            </div>

            <div id="watchlistGrid" class="movie-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check authentication
        if (!localStorage.getItem('userId')) {
            window.location.href = 'index.html';
        }

        // Save note function
        window.saveWatchlistNote = function(movieId) {
            const noteInput = document.getElementById(`note_${movieId}`);
            if (noteInput) {
                const note = noteInput.value;
                localStorage.setItem(`watchlist_note_${movieId}`, note);
                alert('Note saved!');
            }
        };

        // Load saved notes
        function loadSavedNotes() {
            const notes = document.querySelectorAll('[id^="note_"]');
            notes.forEach(noteInput => {
                const movieId = noteInput.id.replace('note_', '');
                const savedNote = localStorage.getItem(`watchlist_note_${movieId}`);
                if (savedNote && noteInput) {
                    noteInput.value = savedNote;
                }
            });
        }

        // Call loadNotes after watchlist loads
        const originalLoadWatchlist = window.loadWatchlist;
        if (originalLoadWatchlist) {
            window.loadWatchlist = async function() {
                await originalLoadWatchlist();
                setTimeout(loadSavedNotes, 100);
            };
        }
    </script>
</body>
</html>
