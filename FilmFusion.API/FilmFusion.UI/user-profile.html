<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - FilmFusion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0a141e 100%);
            min-height: 100vh;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 20%, rgba(58,134,255,0.08) 0%, transparent 60%);
            z-index: -1;
        }

        /* Navbar */
        .dashboard-nav {
            background: rgba(10, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(100, 180, 250, 0.2);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 1.8rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%,100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        .logo-text {
            background: linear-gradient(135deg, #64b4fa, #3a86ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

            .nav-links a {
                text-decoration: none;
                color: rgba(255,255,255,0.7);
                font-weight: 500;
                padding: 0.6rem 1.2rem;
                border-radius: 40px;
                transition: all 0.3s;
                display: flex;
                align-items: center;
                gap: 0.5rem;
                font-size: 0.9rem;
            }

                .nav-links a:hover, .nav-links a.active {
                    background: rgba(100,180,250,0.15);
                    color: #64b4fa;
                    transform: translateY(-2px);
                }

        .logout-btn {
            background: rgba(231,76,60,0.2);
            border: 1px solid rgba(231,76,60,0.3);
            color: #e74c3c;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

            .logout-btn:hover {
                background: rgba(231,76,60,0.3);
                transform: translateY(-2px);
            }

        /* Dashboard Content */
        .dashboard-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Profile Container */
        .profile-container {
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            border: 1px solid rgba(100, 180, 250, 0.2);
            overflow: hidden;
        }

        .profile-header {
            background: linear-gradient(135deg, rgba(58,134,255,0.2), rgba(100,180,250,0.05));
            padding: 2.5rem;
            text-align: center;
            position: relative;
        }

        .avatar-section {
            position: relative;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .profile-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #64b4fa;
            box-shadow: 0 0 25px rgba(100,180,250,0.4);
            transition: all 0.3s;
        }

        .camera-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: linear-gradient(135deg, #3a86ff, #64b4fa);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

            .camera-btn:hover {
                transform: scale(1.1);
                box-shadow: 0 0 10px rgba(100,180,250,0.5);
            }

        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.3rem;
        }

        .profile-role {
            color: #64b4fa;
            font-size: 0.85rem;
            display: inline-block;
            background: rgba(100,180,250,0.15);
            padding: 0.3rem 1rem;
            border-radius: 30px;
        }

        /* Profile Body */
        .profile-body {
            padding: 2rem;
        }

        .info-section {
            margin-bottom: 2rem;
        }

        .info-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(100,180,250,0.2);
        }

            .info-title i {
                color: #64b4fa;
                font-size: 1.2rem;
            }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .info-card-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 1rem;
            transition: all 0.3s;
        }

            .info-card-item:hover {
                background: rgba(100,180,250,0.08);
            }

        .info-card-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .info-card-value {
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            word-break: break-all;
        }

        .bio-text {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 1rem;
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
            font-size: 0.9rem;
        }

        .edit-profile-btn {
            background: linear-gradient(135deg, #3a86ff, #64b4fa);
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: all 0.3s;
            margin-top: 1rem;
        }

            .edit-profile-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(58,134,255,0.4);
            }

        .security-btn {
            background: rgba(100,180,250,0.15);
            border: 1px solid rgba(100,180,250,0.3);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

            .modal-overlay.active {
                opacity: 1;
                visibility: visible;
            }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 28px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(100,180,250,0.3);
        }

            .modal-content h2 {
                color: white;
                margin-bottom: 1.5rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .modal-content input, .modal-content textarea {
                width: 100%;
                padding: 0.8rem 1rem;
                margin-bottom: 1rem;
                background: rgba(255,255,255,0.08);
                border: 1px solid rgba(100,180,250,0.3);
                border-radius: 16px;
                color: white;
                font-size: 0.9rem;
            }

                .modal-content input:focus, .modal-content textarea:focus {
                    outline: none;
                    border-color: #64b4fa;
                }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .save-btn {
            flex: 1;
            padding: 0.8rem;
            background: linear-gradient(135deg, #3a86ff, #64b4fa);
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        .cancel-btn {
            flex: 1;
            padding: 0.8rem;
            background: rgba(231,76,60,0.2);
            border: 1px solid rgba(231,76,60,0.3);
            border-radius: 40px;
            color: #e74c3c;
            cursor: pointer;
        }

        .avatar-options {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .avatar-option {
            flex: 1;
            background: rgba(100,180,250,0.1);
            border: 1px solid rgba(100,180,250,0.3);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

            .avatar-option:hover {
                background: rgba(100,180,250,0.2);
                transform: translateY(-2px);
            }

            .avatar-option i {
                font-size: 2rem;
                color: #64b4fa;
                margin-bottom: 0.5rem;
            }

            .avatar-option p {
                color: white;
                font-size: 0.8rem;
            }

        #galleryInput, #cameraInput {
            display: none;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
            }

            .nav-links {
                justify-content: center;
            }

            .dashboard-content {
                padding: 1rem;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .profile-name {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="nav-container">
                <div class="logo">
                    <span class="logo-icon">🎬</span>
                    <span class="logo-text">FilmFusion</span>
                </div>
                <div class="nav-links">
                    <a href="user-dashboard.html"><i class="fas fa-home"></i> Home</a>
                    <a href="user-favorites.html"><i class="fas fa-heart"></i> Favorites</a>
                    <a href="user-watchlist.html"><i class="fas fa-clock"></i> Watchlist</a>
                    <a href="user-history.html"><i class="fas fa-history"></i> History</a>
                    <a href="user-profile.html" class="active"><i class="fas fa-user"></i> Profile</a>
                </div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </nav>

        <div class="dashboard-content">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="avatar-section">
                        <img id="profileAvatar" class="profile-avatar" src="">
                        <div class="camera-btn" onclick="openAvatarModal()">
                            <i class="fas fa-camera"></i>
                        </div>
                    </div>
                    <h2 class="profile-name" id="profileName">Loading...</h2>
                    <span class="profile-role" id="profileRole">Movie Lover</span>
                </div>

                <div class="profile-body">
                    <div class="info-section">
                        <div class="info-title">
                            <i class="fas fa-user-circle"></i> Personal Information
                        </div>
                        <div class="info-grid">
                            <div class="info-card-item">
                                <div class="info-card-label"><i class="fas fa-envelope"></i> Email</div>
                                <div class="info-card-value" id="profileEmail">-</div>
                            </div>
                            <div class="info-card-item">
                                <div class="info-card-label"><i class="fas fa-calendar-alt"></i> Joined</div>
                                <div class="info-card-value" id="profileJoined">-</div>
                            </div>
                        </div>
                    </div>

                    <div class="info-section">
                        <div class="info-title">
                            <i class="fas fa-pencil-alt"></i> Bio
                        </div>
                        <div class="bio-text" id="profileBio">Loading...</div>
                    </div>

                    <div class="info-section">
                        <div class="info-title">
                            <i class="fas fa-shield-alt"></i> Account Security
                        </div>
                        <button class="edit-profile-btn security-btn" onclick="openChangePasswordModal()">
                            <i class="fas fa-key"></i> Change Password
                        </button>
                    </div>

                    <button class="edit-profile-btn" onclick="openEditModal()">
                        <i class="fas fa-user-edit"></i> Edit Profile
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <h2><i class="fas fa-user-edit"></i> Edit Profile</h2>
            <input type="text" id="editUsername" placeholder="Username">
            <input type="email" id="editEmail" placeholder="Email">
            <textarea id="editBio" placeholder="Write something about yourself..." rows="3"></textarea>
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveProfile()">Save Changes</button>
                <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="passwordModal" class="modal-overlay">
        <div class="modal-content">
            <h2><i class="fas fa-key"></i> Change Password</h2>
            <input type="password" id="oldPassword" placeholder="Current Password">
            <input type="password" id="newPassword" placeholder="New Password">
            <input type="password" id="confirmPassword" placeholder="Confirm New Password">
            <div class="modal-buttons">
                <button class="save-btn" onclick="changePassword()">Update Password</button>
                <button class="cancel-btn" onclick="closePasswordModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Avatar Upload Modal -->
    <div id="avatarModal" class="modal-overlay">
        <div class="modal-content">
            <h2><i class="fas fa-camera"></i> Update Profile Picture</h2>
            <div class="avatar-options">
                <div class="avatar-option" onclick="openGallery()">
                    <i class="fas fa-images"></i>
                    <p>Gallery</p>
                </div>
                <div class="avatar-option" onclick="document.getElementById('cameraInput').click()">
                    <i class="fas fa-camera"></i>
                    <p>Camera</p>
                </div>
            </div>
            <input type="file" id="galleryInput" accept="image/*" onchange="handleGalleryUpload(this)">
            <input type="file" id="cameraInput" accept="image/*" capture="environment">
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeAvatarModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if (!localStorage.getItem('userId')) window.location.href = 'index.html';

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
