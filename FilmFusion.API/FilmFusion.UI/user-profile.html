<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - FilmFusion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0a141e 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.75), rgba(0, 50, 100, 0.5));
            z-index: -1;
        }

        .dashboard-container {
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Glassmorphism Navbar */
        .dashboard-nav {
            background: rgba(10, 20, 30, 0.8);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(100, 180, 250, 0.2);
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 1.8rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        .logo-text {
            background: linear-gradient(135deg, #64b4fa, #3a86ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

            .nav-links a {
                text-decoration: none;
                color: rgba(255, 255, 255, 0.7);
                font-weight: 500;
                padding: 0.5rem 1rem;
                border-radius: 12px;
                transition: all 0.3s ease;
                display: flex;
                align-items: center;
                gap: 0.3rem;
            }

                .nav-links a:hover {
                    color: #64b4fa;
                    background: rgba(100, 180, 250, 0.1);
                }

                .nav-links a.active {
                    background: rgba(100, 180, 250, 0.15);
                    color: #64b4fa;
                }

        .logout-btn {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

            .logout-btn:hover {
                background: rgba(231, 76, 60, 0.3);
                transform: translateY(-2px);
            }

        .dashboard-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Profile Container */
        .profile-container {
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Profile Header */
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .profile-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #64b4fa;
            box-shadow: 0 8px 25px rgba(100, 180, 250, 0.3);
            transition: all 0.3s ease;
        }

            .profile-avatar:hover {
                transform: scale(1.03);
                box-shadow: 0 12px 35px rgba(100, 180, 250, 0.4);
            }

        .edit-avatar-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: linear-gradient(135deg, #3a86ff, #64b4fa);
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

            .edit-avatar-btn:hover {
                transform: scale(1.1);
                background: #64b4fa;
            }

        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.3rem;
        }

        .profile-role-badge {
            display: inline-block;
            background: rgba(100, 180, 250, 0.2);
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            color: #64b4fa;
            border: 1px solid rgba(100, 180, 250, 0.3);
        }

        /* Stats Cards */
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(100, 180, 250, 0.15);
            transition: all 0.3s ease;
        }

            .stat-card:hover {
                border-color: rgba(100, 180, 250, 0.3);
                transform: translateY(-3px);
            }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #64b4fa;
        }

        .stat-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.3rem;
        }

        /* Profile Info Card */
        .profile-info-card {
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(100, 180, 250, 0.15);
            margin-bottom: 1.5rem;
        }

        .info-row {
            display: flex;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(100, 180, 250, 0.1);
        }

            .info-row:last-child {
                border-bottom: none;
            }

        .info-label {
            width: 100px;
            font-weight: 600;
            color: #64b4fa;
        }

        .info-value {
            flex: 1;
            color: rgba(255, 255, 255, 0.8);
        }

        .edit-btn {
            background: linear-gradient(135deg, #3a86ff, #64b4fa);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

            .edit-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(58, 134, 255, 0.3);
            }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0a141e;
            border-radius: 24px;
            padding: 2rem;
            width: 90%;
            max-width: 480px;
            border: 1px solid rgba(100, 180, 250, 0.3);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h2 {
            color: white;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(100, 180, 250, 0.3);
            border-radius: 12px;
            font-size: 0.95rem;
            color: white;
            transition: all 0.3s ease;
        }

            .modal-content input:focus,
            .modal-content textarea:focus {
                outline: none;
                border-color: #64b4fa;
                background: rgba(255, 255, 255, 0.12);
            }

            .modal-content input::placeholder,
            .modal-content textarea::placeholder {
                color: rgba(255, 255, 255, 0.4);
            }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

            .modal-buttons button {
                flex: 1;
                padding: 0.8rem;
                border: none;
                border-radius: 12px;
                cursor: pointer;
                font-weight: 600;
                transition: all 0.3s ease;
            }

        .save-btn {
            background: linear-gradient(135deg, #3a86ff, #64b4fa);
            color: white;
        }

            .save-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(58, 134, 255, 0.3);
            }

        .cancel-btn {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }

            .cancel-btn:hover {
                background: rgba(255, 255, 255, 0.15);
            }

        /* Avatar Options */
        .avatar-options {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 1rem 0;
            justify-content: center;
        }

        .avatar-option {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

            .avatar-option:hover {
                transform: scale(1.1);
                border-color: #64b4fa;
            }

        /* Upload Area */
        .upload-area {
            border: 2px dashed rgba(100, 180, 250, 0.5);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            margin: 1rem 0;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
        }

            .upload-area:hover {
                background: rgba(100, 180, 250, 0.1);
                border-color: #64b4fa;
            }

        .upload-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .upload-area p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
        }

        .hidden-file-input {
            display: none;
        }

        /* Login Popup */
        .login-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .login-popup-content {
            background: #0a141e;
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            max-width: 350px;
            border: 1px solid #3a86ff;
        }

            .login-popup-content .popup-icon {
                font-size: 3rem;
                margin-bottom: 1rem;
            }

            .login-popup-content h2 {
                color: white;
                margin-bottom: 0.5rem;
            }

            .login-popup-content p {
                color: rgba(255, 255, 255, 0.6);
                margin-bottom: 1.5rem;
            }

            .login-popup-content button {
                background: linear-gradient(135deg, #3a86ff, #64b4fa);
                color: white;
                border: none;
                padding: 0.7rem 1.5rem;
                border-radius: 50px;
                cursor: pointer;
                font-weight: 600;
                margin: 0.3rem;
            }

            .login-popup-content .close-popup {
                background: rgba(255, 255, 255, 0.1);
                color: rgba(255, 255, 255, 0.7);
            }

        @media (max-width: 768px) {
            .dashboard-nav {
                flex-direction: column;
                gap: 1rem;
            }

            .dashboard-content {
                padding: 1rem;
            }

            .profile-stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.5rem;
            }

            .info-row {
                flex-direction: column;
                gap: 0.3rem;
            }

            .info-label {
                width: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Video Background -->
    <video class="video-background" autoplay muted loop playsinline>
        <source src="videos/v3.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="dashboard-container">
        <!-- Glassmorphism Navbar -->
        <nav class="dashboard-nav">
            <div class="logo">
                <span class="logo-icon">🎬</span>
                <span class="logo-text">FilmFusion</span>
            </div>
            <div class="nav-links">
                <a href="user-dashboard.html">🏠 Home</a>
                <a href="user-favorites.html">❤️ Favorites</a>
                <a href="user-watchlist.html">📝 Watchlist</a>
                <a href="user-profile.html" class="active">👤 Profile</a>
                <button class="logout-btn" onclick="window.logout()">🚪 Logout</button>
            </div>
        </nav>

        <div class="dashboard-content profile-container">
            <!-- Profile Header -->
            <div class="profile-header">
                <div class="avatar-container">
                    <img id="profileAvatar" class="profile-avatar" src="" alt="Profile">
                    <button class="edit-avatar-btn" onclick="window.openAvatarModal()">✎</button>
                </div>
                <h1 class="profile-name" id="profileName">Loading...</h1>
                <div class="profile-role-badge" id="profileRole">🎬 Movie Lover</div>
            </div>

            <!-- Stats Cards -->
            <div class="profile-stats">
                <div class="stat-card">
                    <div class="stat-number" id="statMovies">0</div>
                    <div class="stat-label">Movies Watched</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statFavorites">0</div>
                    <div class="stat-label">Favorites</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statWatchlist">0</div>
                    <div class="stat-label">Watchlist</div>
                </div>
            </div>

            <!-- Profile Info Card -->
            <div class="profile-info-card">
                <div class="info-row">
                    <div class="info-label">📧 Email</div>
                    <div class="info-value" id="profileEmail">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">📅 Joined</div>
                    <div class="info-value" id="profileJoined">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">👤 Role</div>
                    <div class="info-value" id="profileUserRole">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">📝 Bio</div>
                    <div class="info-value" id="profileBio">-</div>
                </div>

                <button class="edit-btn" onclick="window.openEditModal()">
                    ✏️ Edit Profile
                </button>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <h2>✏️ Edit Profile</h2>
            <input type="text" id="editUsername" placeholder="Username">
            <input type="email" id="editEmail" placeholder="Email">
            <textarea id="editBio" rows="3" placeholder="Tell us about yourself..."></textarea>
            <div class="modal-buttons">
                <button class="save-btn" onclick="window.saveProfile()">Save Changes</button>
                <button class="cancel-btn" onclick="window.closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Avatar Selection Modal -->
    <div id="avatarModal" class="modal-overlay">
        <div class="modal-content">
            <h2>🎨 Choose Profile Picture</h2>

            <!-- Upload from Gallery -->
            <div class="upload-area" onclick="document.getElementById('galleryInput').click()">
                <div class="upload-icon">📸</div>
                <p>Click to upload from gallery</p>
                <input type="file" id="galleryInput" class="hidden-file-input" accept="image/*" onchange="window.handleGalleryUpload(event)">
            </div>

            <!-- Camera Option -->
            <div class="upload-area" onclick="document.getElementById('cameraInput').click()">
                <div class="upload-icon">📷</div>
                <p>Take a photo with camera</p>
                <input type="file" id="cameraInput" class="hidden-file-input" accept="image/*" capture="environment" onchange="window.handleCameraUpload(event)">
            </div>

            <div style="text-align: center; margin: 0.5rem 0; color: rgba(255,255,255,0.5);">or</div>

            <!-- Avatar Options -->
            <div class="avatar-options" id="avatarOptions"></div>

            <!-- Custom URL Option -->
            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <input type="text" id="avatarUrlInput" placeholder="Or paste image URL..." style="flex: 1;">
                <button class="save-btn" onclick="window.setCustomAvatar()">Set</button>
            </div>
            <div class="modal-buttons" style="margin-top: 1rem;">
                <button class="cancel-btn" onclick="window.closeAvatarModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check authentication
        (function() {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                const popupDiv = document.createElement('div');
                popupDiv.className = 'login-popup';
                popupDiv.id = 'loginPopup';
                popupDiv.innerHTML = `
                    <div class="login-popup-content">
                        <div class="popup-icon">🔐</div>
                        <h2>Login Required</h2>
                        <p>Please login to view your profile</p>
                        <button onclick="window.location.href='index.html'">Go to Login</button>
                        <button class="close-popup" onclick="document.getElementById('loginPopup').remove()">Close</button>
                    </div>
                `;
                document.body.appendChild(popupDiv);
                setTimeout(() => {
                    if (document.getElementById('loginPopup')) {
                        window.location.href = 'index.html';
                    }
                }, 3000);
            }
        })();

        // Load user stats
        async function loadUserStats() {
            const userId = localStorage.getItem('userId');
            if (!userId) return;

            try {
                const favRes = await fetch(`${API_URL}/Movies/favorites/${userId}`);
                const favorites = await favRes.json();
                document.getElementById('statFavorites').innerText = favorites.length || 0;

                const watchRes = await fetch(`${API_URL}/Movies/watchlist/${userId}`);
                const watchlist = await watchRes.json();
                document.getElementById('statWatchlist').innerText = watchlist.length || 0;

                // Movies watched count (from UserMovieInteractions)
                const interRes = await fetch(`${API_URL}/UserMovieInteractions/${userId}/watched`);
                if (interRes.ok) {
                    const watched = await interRes.json();
                    document.getElementById('statMovies').innerText = watched.length || 0;
                } else {
                    document.getElementById('statMovies').innerText = '0';
                }
            } catch(e) {
                console.error('Error loading stats:', e);
            }
        }

        // Call loadUserStats when profile loads
        if (localStorage.getItem('userId')) {
            loadUserStats();
        }
    </script>
</body>
</html>
