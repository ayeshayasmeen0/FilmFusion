<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorites - FilmFusion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0a141e 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.75), rgba(0, 50, 100, 0.5));
            z-index: -1;
        }

        .dashboard-container {
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Navbar */
        .dashboard-nav {
            background: rgba(10, 20, 30, 0.8);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(100, 180, 250, 0.2);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 1.8rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        .logo-text {
            background: linear-gradient(135deg, #64b4fa, #3a86ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

            .nav-links a {
                text-decoration: none;
                color: rgba(255, 255, 255, 0.7);
                font-weight: 500;
                padding: 0.5rem 1rem;
                border-radius: 12px;
                transition: all 0.3s ease;
                display: flex;
                align-items: center;
                gap: 0.3rem;
            }

                .nav-links a:hover {
                    color: #64b4fa;
                    background: rgba(100, 180, 250, 0.1);
                }

                .nav-links a.active {
                    background: rgba(100, 180, 250, 0.15);
                    color: #64b4fa;
                }

        .logout-btn {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

            .logout-btn:hover {
                background: rgba(231, 76, 60, 0.3);
                transform: translateY(-2px);
            }

        .dashboard-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .favorites-header {
            text-align: center;
            margin-bottom: 2rem;
        }

            .favorites-header h1 {
                font-size: 2rem;
                background: linear-gradient(135deg, #64b4fa, #3a86ff);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                margin-bottom: 0.5rem;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
            }

            .favorites-header p {
                color: rgba(255, 255, 255, 0.6);
                font-size: 0.9rem;
            }

        /* Movie Grid */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        /* Movie Card */
        .movie-card {
            background: rgba(20, 30, 40, 0.85);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 1px solid rgba(100, 180, 250, 0.15);
            position: relative;
        }

            .movie-card:hover {
                transform: translateY(-8px);
                border-color: rgba(100, 180, 250, 0.4);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            }

        /* Movie Poster */
        .movie-poster {
            position: relative;
            overflow: hidden;
            aspect-ratio: 2/3;
        }

            .movie-poster img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.5s ease;
            }

        .movie-card:hover .movie-poster img {
            transform: scale(1.05);
        }

        /* Rating Badge */
        .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #ffc107;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            z-index: 5;
        }

        /* Remove Button - Properly Styled */
        .remove-fav-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

            .remove-fav-btn:hover {
                background: #c0392b;
                transform: scale(1.1);
                box-shadow: 0 4px 12px rgba(231, 76, 60, 0.5);
            }

        /* Heart Icon */
        .heart-icon-badge {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(100, 180, 250, 0.85);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            backdrop-filter: blur(5px);
            z-index: 5;
        }

        /* Movie Info */
        .movie-info {
            padding: 1rem;
        }

        .movie-title {
            font-weight: 700;
            color: white;
            margin-bottom: 0.3rem;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-year {
            font-size: 0.7rem;
            color: rgba(100, 180, 250, 0.7);
        }

        .movie-genre {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.4rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

            .movie-genre span {
                background: rgba(100, 180, 250, 0.15);
                padding: 0.2rem 0.6rem;
                border-radius: 12px;
                font-size: 0.65rem;
            }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: rgba(10, 20, 30, 0.5);
            border-radius: 24px;
        }

            .empty-state .empty-icon {
                font-size: 4rem;
                margin-bottom: 1rem;
                opacity: 0.5;
            }

            .empty-state h3 {
                color: white;
                margin-bottom: 0.5rem;
            }

            .empty-state p {
                color: rgba(255, 255, 255, 0.5);
                margin-bottom: 1.5rem;
            }

            .empty-state .btn-explore {
                background: linear-gradient(135deg, #3a86ff, #64b4fa);
                color: white;
                border: none;
                padding: 0.8rem 2rem;
                border-radius: 50px;
                cursor: pointer;
                font-weight: 600;
                transition: all 0.3s ease;
            }

                .empty-state .btn-explore:hover {
                    transform: translateY(-3px);
                    box-shadow: 0 8px 20px rgba(58, 134, 255, 0.3);
                }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #64b4fa;
        }

        @media (max-width: 768px) {
            .dashboard-nav {
                flex-direction: column;
                gap: 1rem;
            }

            .dashboard-content {
                padding: 1rem;
            }

            .movie-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }

            .remove-fav-btn {
                width: 28px;
                height: 28px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <video class="video-background" autoplay muted loop playsinline>
        <source src="videos/v4.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="logo">
                <span class="logo-icon">🎬</span>
                <span class="logo-text">FilmFusion</span>
            </div>
            <div class="nav-links">
                <a href="user-dashboard.html">🏠 Home</a>
                <a href="user-favorites.html" class="active">❤️ Favorites</a>
                <a href="user-watchlist.html">📝 Watchlist</a>
                <a href="user-profile.html">👤 Profile</a>
                <button class="logout-btn" onclick="window.logout()">🚪 Logout</button>
            </div>
        </nav>

        <div class="dashboard-content">
            <div class="favorites-header">
                <h1><span>❤️</span> Your Favorite Movies</h1>
                <p>Movies you've loved and saved for later</p>
            </div>

            <div id="favoritesGrid" class="movie-grid">
                <div class="loading">🎬 Loading your favorites...</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if (!localStorage.getItem('userId')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
