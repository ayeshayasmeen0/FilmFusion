<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My History - FilmFusion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0a141e 100%);
            min-height: 100vh;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(58,134,255,0.08) 0%, transparent 60%);
            z-index: -1;
        }

        /* Navbar */
        .dashboard-nav {
            background: rgba(10, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(100, 180, 250, 0.2);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 1.8rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%,100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        .logo-text {
            background: linear-gradient(135deg, #64b4fa, #3a86ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

            .nav-links a {
                text-decoration: none;
                color: rgba(255,255,255,0.7);
                font-weight: 500;
                padding: 0.6rem 1.2rem;
                border-radius: 40px;
                transition: all 0.3s;
                display: flex;
                align-items: center;
                gap: 0.5rem;
                font-size: 0.9rem;
            }

                .nav-links a:hover, .nav-links a.active {
                    background: rgba(100,180,250,0.15);
                    color: #64b4fa;
                    transform: translateY(-2px);
                }

        .logout-btn {
            background: rgba(231,76,60,0.2);
            border: 1px solid rgba(231,76,60,0.3);
            color: #e74c3c;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

            .logout-btn:hover {
                background: rgba(231,76,60,0.3);
                transform: translateY(-2px);
            }

        /* Dashboard Content */
        .dashboard-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

            .page-header h1 {
                font-size: 2rem;
                font-weight: 800;
                background: linear-gradient(135deg, #64b4fa, #3a86ff);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                display: inline-flex;
                align-items: center;
                gap: 0.8rem;
            }

        .clear-btn {
            background: rgba(231,76,60,0.15);
            border: 1px solid rgba(231,76,60,0.3);
            color: #e74c3c;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

            .clear-btn:hover {
                background: rgba(231,76,60,0.3);
                transform: translateY(-2px);
            }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 2rem;
        }

            .timeline::before {
                content: '';
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 2px;
                background: linear-gradient(180deg, #3a86ff, #64b4fa, transparent);
            }

        .history-item {
            position: relative;
            margin-bottom: 1.5rem;
            background: rgba(10,20,30,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(100,180,250,0.1);
            margin-left: 1rem;
        }

            .history-item::before {
                content: '';
                position: absolute;
                left: -1.8rem;
                top: 1.5rem;
                width: 12px;
                height: 12px;
                background: #64b4fa;
                border-radius: 50%;
                border: 2px solid #0a141e;
            }

            .history-item:hover {
                transform: translateX(5px);
                border-color: rgba(100,180,250,0.3);
                background: rgba(100,180,250,0.05);
            }

        .history-content {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .history-icon {
            width: 50px;
            height: 50px;
            background: rgba(100,180,250,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

            .history-icon.watch {
                background: rgba(58,134,255,0.2);
                color: #3a86ff;
            }

            .history-icon.like {
                background: rgba(46,204,113,0.2);
                color: #2ecc71;
            }

            .history-icon.dislike {
                background: rgba(231,76,60,0.2);
                color: #e74c3c;
            }

            .history-icon.favorite {
                background: rgba(241,196,15,0.2);
                color: #f1c40f;
            }

            .history-icon.watchlist {
                background: rgba(155,89,182,0.2);
                color: #d2b0e5;
            }

        .history-details {
            flex: 1;
        }

        .history-title {
            color: white;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .history-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .history-action {
            background: rgba(100,180,250,0.15);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #64b4fa;
            font-weight: 500;
        }

        .history-time {
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: rgba(10,20,30,0.5);
            border-radius: 28px;
            backdrop-filter: blur(10px);
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: rgba(255,255,255,0.5);
            margin-bottom: 1.5rem;
        }

        .btn-explore {
            background: linear-gradient(135deg, #3a86ff, #64b4fa);
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

            .btn-explore:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(58,134,255,0.4);
            }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
            }

            .nav-links {
                justify-content: center;
            }

            .dashboard-content {
                padding: 1rem;
            }

            .timeline {
                padding-left: 1rem;
            }

            .history-item::before {
                left: -1.3rem;
            }

            .page-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="nav-container">
                <div class="logo">
                    <span class="logo-icon">🎬</span>
                    <span class="logo-text">FilmFusion</span>
                </div>
                <div class="nav-links">
                    <a href="user-dashboard.html"><i class="fas fa-home"></i> Home</a>
                    <a href="user-favorites.html"><i class="fas fa-heart"></i> Favorites</a>
                    <a href="user-watchlist.html"><i class="fas fa-clock"></i> Watchlist</a>
                    <a href="user-history.html" class="active"><i class="fas fa-history"></i> History</a>
                    <a href="user-profile.html"><i class="fas fa-user"></i> Profile</a>
                </div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </nav>

        <div class="dashboard-content">
            <div class="page-header">
                <h1><i class="fas fa-history"></i> Activity History</h1>
                <button class="clear-btn" onclick="clearHistory()"><i class="fas fa-trash-alt"></i> Clear All</button>
            </div>
            <div id="historyList" class="timeline"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if (!localStorage.getItem('userId')) window.location.href = 'index.html';
        if (window.loadHistoryPage) window.loadHistoryPage();

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
