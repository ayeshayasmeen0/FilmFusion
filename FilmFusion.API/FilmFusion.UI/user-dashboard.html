<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmFusion - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Your existing CSS - keep as is */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0a141e 100%);
            min-height: 100vh;
        }

        .dashboard-nav {
            background: rgba(10, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(100, 180, 250, 0.2);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 1.8rem;
        }

        .logo-text {
            background: linear-gradient(135deg, #64b4fa, #3a86ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

            .nav-links a {
                text-decoration: none;
                color: rgba(255,255,255,0.7);
                padding: 0.6rem 1.2rem;
                border-radius: 40px;
                transition: 0.3s;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

                .nav-links a:hover, .nav-links a.active {
                    background: rgba(100,180,250,0.15);
                    color: #64b4fa;
                }

        .user-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a86ff, #64b4fa);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

            .user-avatar img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        .dropdown-menu {
            position: absolute;
            top: 55px;
            right: 0;
            background: rgba(20,30,40,0.98);
            border-radius: 20px;
            min-width: 220px;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .user-profile-dropdown {
            position: relative;
            cursor: pointer;
        }

            .user-profile-dropdown:hover .dropdown-menu {
                opacity: 1;
                visibility: visible;
            }

        .dropdown-item {
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
        }

            .dropdown-item:hover {
                background: rgba(100,180,250,0.1);
                color: #64b4fa;
            }

        .logout-dropdown {
            color: #e74c3c;
        }

        .dashboard-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .hero-banner {
            background: linear-gradient(135deg, rgba(58,134,255,0.15), rgba(100,180,250,0.05));
            border-radius: 32px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(100,180,250,0.2);
        }

            .hero-banner h1 {
                font-size: 2rem;
                color: white;
            }

                .hero-banner h1 span {
                    color: #64b4fa;
                }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(10,20,30,0.6);
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid rgba(100,180,250,0.15);
        }

            .stat-card .stat-number {
                font-size: 2rem;
                font-weight: 800;
                color: white;
            }

            .stat-card .stat-label {
                font-size: 0.75rem;
                color: rgba(255,255,255,0.5);
            }

        .glass-card {
            background: rgba(10,20,30,0.5);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid rgba(100,180,250,0.15);
        }

        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

            .search-bar input {
                flex: 1;
                padding: 0.8rem 1.2rem;
                background: rgba(255,255,255,0.08);
                border: 1px solid rgba(100,180,250,0.3);
                border-radius: 50px;
                color: white;
            }

            .search-bar select {
                padding: 0.8rem 1.2rem;
                background: rgba(255,255,255,0.08);
                border: 1px solid rgba(100,180,250,0.3);
                border-radius: 50px;
                color: white;
            }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .movie-card {
            background: rgba(20,30,40,0.85);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }

            .movie-card:hover {
                transform: translateY(-5px);
            }

        .movie-poster {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
        }

            .movie-poster img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        .movie-rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #ffc107;
        }

        .movie-info {
            padding: 0.8rem;
        }

        .movie-title {
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .movie-year {
            font-size: 0.7rem;
            color: rgba(100,180,250,0.7);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #64b4fa;
        }

        .quick-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .quick-action-btn {
            background: rgba(100,180,250,0.15);
            border: 1px solid rgba(100,180,250,0.3);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
            }

            .dashboard-content {
                padding: 1rem;
            }

            .movie-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }

            .hero-banner h1 {
                font-size: 1.4rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="nav-container">
                <div class="logo"><span class="logo-icon">🎬</span><span class="logo-text">FilmFusion</span></div>
                <div class="nav-links">
                    <a href="user-dashboard.html" class="active"><i class="fas fa-home"></i> Home</a>
                    <a href="user-favorites.html"><i class="fas fa-heart"></i> Favorites</a>
                    <a href="user-watchlist.html"><i class="fas fa-clock"></i> Watchlist</a>
                    <a href="user-history.html"><i class="fas fa-history"></i> History</a>
                    <a href="user-profile.html"><i class="fas fa-user"></i> Profile</a>
                </div>
                <div class="user-section">
                    <div class="user-profile-dropdown">
                        <div class="user-avatar" id="navUserAvatar"><span>👤</span></div>
                        <div class="dropdown-menu">
                            <a href="user-profile.html" class="dropdown-item"><i class="fas fa-user"></i> My Profile</a>
                            <a href="user-favorites.html" class="dropdown-item"><i class="fas fa-heart"></i> My Favorites</a>
                            <a href="user-watchlist.html" class="dropdown-item"><i class="fas fa-clock"></i> My Watchlist</a>
                            <a href="user-history.html" class="dropdown-item"><i class="fas fa-history"></i> Watch History</a>
                            <div class="dropdown-divider"></div>
                            <a href="#" class="dropdown-item logout-dropdown" id="dropdownLogout"><i class="fas fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <div class="dashboard-content">
            <div class="hero-banner">
                <h1>Welcome back, <span id="userNameDisplay">Movie Lover</span>! 🎉</h1>
                <p>Discover your next favorite movie from our collection.</p>
                <div class="quick-actions">
                    <button class="quick-action-btn" onclick="location.href='user-favorites.html'"><i class="fas fa-heart"></i> My Favorites</button>
                    <button class="quick-action-btn" onclick="location.href='user-watchlist.html'"><i class="fas fa-clock"></i> My Watchlist</button>
                    <button class="quick-action-btn" onclick="location.href='user-history.html'"><i class="fas fa-history"></i> Watch History</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="totalMovies">0</div><div class="stat-label">Total Movies</div></div>
                <div class="stat-card"><div class="stat-number" id="favoritesCount">0</div><div class="stat-label">My Favorites</div></div>
                <div class="stat-card"><div class="stat-number" id="watchlistCount">0</div><div class="stat-label">My Watchlist</div></div>
                <div class="stat-card"><div class="stat-number" id="historyCount">0</div><div class="stat-label">Watch History</div></div>
            </div>

            <div class="glass-card">
                <h2 style="color:white; margin-bottom:1rem;"><i class="fas fa-film"></i> Discover Movies</h2>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 Search movies...">
                    <select id="genreFilter">
                        <option value="">All Genres</option>
                        <option value="action">Action</option>
                        <option value="comedy">Comedy</option>
                        <option value="drama">Drama</option>
                        <option value="horror">Horror</option>
                        <option value="sci-fi">Sci-Fi</option>
                    </select>
                </div>
                <div id="moviesGrid" class="movie-grid">
                    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading movies...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
    (function() {
        // SIMPLE AUTHENTICATION - NO REDIRECT LOOP
        const userId = localStorage.getItem('userId');
        const userName = localStorage.getItem('userName');
        const userEmail = localStorage.getItem('userEmail') || 'user@filmfusion.com';
        const userAvatar = localStorage.getItem('userAvatar');

        console.log('Dashboard Loaded - User:', userId, 'Name:', userName);

        // ONLY redirect if NO userId
        if (!userId || userId === 'null' || userId === 'undefined' || userId === '') {
            console.log('No user found, redirecting to login');
            window.location.href = 'index.html';
            return;
        }

        // Set welcome name
        const nameSpan = document.getElementById('userNameDisplay');
        if (nameSpan && userName && userName !== 'null') {
            nameSpan.innerText = userName;
        }

        // Set navbar name
        const navNameSpan = document.getElementById('navUserName');
        if (navNameSpan && userName && userName !== 'null') {
            navNameSpan.innerText = userName;
        }

        // Set navbar email
        const navEmailSpan = document.getElementById('navUserEmail');
        if (navEmailSpan) {
            navEmailSpan.innerText = userEmail;
        }

        // Set avatar
        const navAvatar = document.getElementById('navUserAvatar');
        if (navAvatar) {
            if (userAvatar && userAvatar !== 'null') {
                navAvatar.innerHTML = `<img src="${userAvatar}">`;
            } else {
                navAvatar.innerHTML = '<span>👤</span>';
            }
        }

        // Load stats after delay
        setTimeout(function() {
            if (typeof window.loadUserStats === 'function') {
                window.loadUserStats();
            }
        }, 500);

        // Logout
        const logoutBtn = document.getElementById('dropdownLogout');
        if (logoutBtn) {
            logoutBtn.onclick = function(e) {
                e.preventDefault();
                localStorage.clear();
                window.location.href = 'index.html';
            };
        }

        // Load movies
        if (typeof loadMovies === 'function') {
            loadMovies();
        }
    })();
    </script>
</body>
</html>
