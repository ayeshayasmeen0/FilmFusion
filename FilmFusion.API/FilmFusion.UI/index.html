<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmFusion - Movie Recommender</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: #0a0a0a;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.75), rgba(0, 50, 100, 0.6));
            z-index: 1;
        }

        /* Animated Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(100, 180, 250, 0.4);
            border-radius: 50%;
            animation: floatParticle 15s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 0.5;
            }

            90% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* Container */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Main Card */
        .main-card {
            background: rgba(10, 20, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(100, 180, 250, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 3rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #64b4fa, #3a86ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 0.5rem;
        }

        .logo-sub {
            font-size: 0.85rem;
            color: rgba(100, 180, 250, 0.7);
            margin-top: 0.25rem;
        }

        /* Welcome Text */
        .welcome-text {
            text-align: center;
            margin-bottom: 2rem;
        }

            .welcome-text h2 {
                font-size: 1.8rem;
                font-weight: 700;
                color: white;
                margin-bottom: 0.5rem;
            }

            .welcome-text p {
                color: rgba(255, 255, 255, 0.6);
                font-size: 0.9rem;
            }

        /* Form */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(100, 180, 250, 0.3);
            border-radius: 16px;
            font-size: 0.95rem;
            color: white;
            transition: all 0.3s ease;
        }

            .form-input:focus {
                outline: none;
                border-color: #3a86ff;
                background: rgba(255, 255, 255, 0.12);
                box-shadow: 0 0 0 3px rgba(58, 134, 255, 0.2);
            }

            .form-input::placeholder {
                color: rgba(255, 255, 255, 0.4);
            }

        /* Button */
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3a86ff, #64b4fa);
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

            .btn-login:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(58, 134, 255, 0.4);
            }

        /* Links */
        .form-links {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .forgot-link {
            color: #64b4fa;
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.3s;
        }

            .forgot-link:hover {
                color: #3a86ff;
            }

        .signup-prompt {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(100, 180, 250, 0.2);
        }

            .signup-prompt p {
                color: rgba(255, 255, 255, 0.5);
                font-size: 0.85rem;
            }

        .signup-link {
            color: #64b4fa;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

            .signup-link:hover {
                text-decoration: underline;
            }

        /* Register Form */
        .register-form {
            display: none;
        }

        /* Admin Hidden Link */
        .admin-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.7rem;
        }

            .admin-link a {
                color: rgba(100, 180, 250, 0.4);
                text-decoration: none;
                transition: 0.3s;
            }

                .admin-link a:hover {
                    color: rgba(100, 180, 250, 0.7);
                }

        /* Responsive */
        @media (max-width: 768px) {
            .main-card {
                padding: 2rem;
                margin: 1rem;
            }

            .logo-text {
                font-size: 1.5rem;
            }

            .welcome-text h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Video Background -->
    <video class="video-background" autoplay muted loop playsinline>
        <source src="videos/v1.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="main-card">
            <div class="logo">
                <div class="logo-icon">🎬</div>
                <div class="logo-text">FilmFusion</div>
                <div class="logo-sub">Discover Your Next Favorite Movie</div>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="login-form">
                <div class="welcome-text">
                    <h2>Welcome Back</h2>
                    <p>Login to your account</p>
                </div>

                <div class="form-group">
                    <input type="email" id="loginEmail" class="form-input" placeholder="Email / Username">
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" class="form-input" placeholder="Password">
                </div>

                <div class="form-links">
                    <a href="#" class="forgot-link" id="forgotPassword">Forgot password?</a>
                </div>

                <button class="btn-login" id="loginSubmitBtn">Login →</button>

                <div class="signup-prompt">
                    <p>Don't have an account? <a class="signup-link" id="showSignupBtn">Sign up</a></p>
                </div>
            </div>

            <!-- Signup/Register Form -->
            <div id="signupForm" class="register-form">
                <div class="welcome-text">
                    <h2>Create Account</h2>
                    <p>Join FilmFusion today</p>
                </div>

                <div class="form-group">
                    <input type="text" id="signupUsername" class="form-input" placeholder="Username">
                </div>
                <div class="form-group">
                    <input type="email" id="signupEmail" class="form-input" placeholder="Email address">
                </div>
                <div class="form-group">
                    <input type="password" id="signupPassword" class="form-input" placeholder="Password">
                </div>
                <div class="form-group">
                    <input type="password" id="signupConfirmPassword" class="form-input" placeholder="Confirm Password">
                </div>

                <button class="btn-login" id="signupSubmitBtn">Register →</button>

                <div class="signup-prompt">
                    <p>Already have an account? <a class="signup-link" id="showLoginBtn">Login</a></p>
                </div>
            </div>

            <!-- Hidden Admin Link -->
            <div class="admin-link">
                <a href="#" id="adminLink">🔐 Admin</a>
            </div>
        </div>
    </div>

    <!-- Admin Login Modal (Hidden by default) -->
    <div id="adminModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: #0a141e; border-radius: 28px; padding: 2rem; width: 90%; max-width: 380px; border: 1px solid #3a86ff;">
            <h3 style="color: white; text-align: center; margin-bottom: 1rem;">👑 Admin Login</h3>
            <input type="email" id="adminEmail" placeholder="Admin Email" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: rgba(255,255,255,0.1); border: 1px solid #3a86ff; border-radius: 12px; color: white;">
            <input type="password" id="adminPassword" placeholder="Password" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: rgba(255,255,255,0.1); border: 1px solid #3a86ff; border-radius: 12px; color: white;">
            <button id="adminLoginBtn" style="width: 100%; padding: 0.8rem; background: linear-gradient(135deg, #3a86ff, #64b4fa); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer;">Login</button>
            <button id="closeAdminModal" style="width: 100%; padding: 0.8rem; margin-top: 0.5rem; background: transparent; border: 1px solid #555; border-radius: 12px; color: #aaa; cursor: pointer;">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
